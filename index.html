<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Places Live Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Upload Places JSON</h1>
        <p>
          Upload a JSON file with place objects including coordinates. Example keys
          supported: <code>name</code>, <code>latitude</code>/<code>longitude</code>
          or <code>lat</code>/<code>lng</code> (also <code>Lat</code>/<code>Lng</code>). Files are processed in batches; very large files may be rejected to keep the browser responsive.
        </p>

        <label for="jsonFile" class="upload-label">Choose JSON file</label>
        <input id="jsonFile" type="file" accept="application/json,.json" />

        <p id="status" class="status">Waiting for a file…</p>

        <h2>Loaded places</h2>
        <ul id="placesList" class="places-list"></ul>
      </section>

      <section class="map-wrap">
        <div id="map" aria-label="Live map"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
